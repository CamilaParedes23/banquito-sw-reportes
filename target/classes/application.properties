spring.application.name=banquito-switch-reporting-service
server.port=${SERVER_PORT:8085}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/SWITCH_REPORTES_DB}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/init/001_create_off_us_clearing_tables.sql,classpath:db/init/002_create_line_consolidation_tables.sql,classpath:db/init/003_create_final_reporting_tables.sql

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

rabbit.exchange.batch=${RABBIT_EXCHANGE_BATCH:switch.batch.exchange}
rabbit.exchange.routing=${RABBIT_EXCHANGE_ROUTING:switch.routing.exchange}
rabbit.exchange.settlement=${RABBIT_EXCHANGE_SETTLEMENT:switch.settlement.exchange}
rabbit.exchange.clearing=${RABBIT_EXCHANGE_CLEARING:switch.clearing.exchange}
rabbit.exchange.billing=${RABBIT_EXCHANGE_BILLING:switch.billing.exchange}
rabbit.exchange.reporting=${RABBIT_EXCHANGE_REPORTING:switch.reporting.exchange}
rabbit.queue.reporting.payment-lines-observer=${RABBIT_QUEUE_REPORTING_PAYMENT_LINES_OBSERVER:switch.reporting.payment-lines-observer.queue}
rabbit.queue.reporting.on-us-completed=${RABBIT_QUEUE_REPORTING_ON_US_COMPLETED:switch.reporting.on-us-completed.queue}
rabbit.queue.reporting.line-rejected=${RABBIT_QUEUE_REPORTING_LINE_REJECTED:switch.reporting.line-rejected.queue}
rabbit.queue.clearing.off-us=${RABBIT_QUEUE_CLEARING_OFF_US:switch.clearing.off-us.queue}
rabbit.queue.clearing.included=${RABBIT_QUEUE_CLEARING_INCLUDED:switch.clearing.included.queue}
rabbit.queue.billing.batch-completed=${RABBIT_QUEUE_BILLING_BATCH_COMPLETED:switch.billing.batch-completed.queue}
rabbit.queue.reporting.billing-completed=${RABBIT_QUEUE_REPORTING_BILLING_COMPLETED:switch.reporting.billing-completed.queue}
rabbit.queue.reporting.batch-closed=${RABBIT_QUEUE_REPORTING_BATCH_CLOSED:switch.reporting.batch-closed.queue}
rabbit.queue.reporting.notifications=${RABBIT_QUEUE_REPORTING_NOTIFICATIONS:switch.reporting.notifications.queue}
rabbit.routing-key.payment-line-requested=${RABBIT_ROUTING_KEY_PAYMENT_LINE_REQUESTED:payment.line.requested}
rabbit.routing-key.on-us-completed=${RABBIT_ROUTING_KEY_ON_US_COMPLETED:payment.line.on-us.completed}
rabbit.routing-key.routed-off-us=${RABBIT_ROUTING_KEY_ROUTED_OFF_US:payment.line.routed.off-us}
rabbit.routing-key.off-us-included=${RABBIT_ROUTING_KEY_OFF_US_INCLUDED:payment.line.off-us.included}
rabbit.routing-key.line-rejected=${RABBIT_ROUTING_KEY_LINE_REJECTED:payment.line.rejected}
rabbit.routing-key.batch-lines-completed=${RABBIT_ROUTING_KEY_BATCH_LINES_COMPLETED:batch.lines.completed}
rabbit.routing-key.billing-completed=${RABBIT_ROUTING_KEY_BILLING_COMPLETED:billing.completed}
rabbit.routing-key.batch-closed=${RABBIT_ROUTING_KEY_BATCH_CLOSED:batch.closed}
rabbit.routing-key.notification-requested=${RABBIT_ROUTING_KEY_NOTIFICATION_REQUESTED:notification.requested}

switch.files.output-directory=${SWITCH_FILES_OUTPUT_DIRECTORY:/app/output}
switch.files.clearing-directory=${SWITCH_FILES_CLEARING_DIRECTORY:/app/output/clearing}
switch.files.reports-directory=${SWITCH_FILES_REPORTS_DIRECTORY:/app/output/reports}
switch.files.receipts-directory=${SWITCH_FILES_RECEIPTS_DIRECTORY:/app/output/receipts}

notification.kong.base-url=${NOTIFICATION_KONG_BASE_URL:http://localhost:8000}
notification.kong.requests-path=${NOTIFICATION_KONG_REQUESTS_PATH:/api/v1/notifications/requests}
notification.kong.auth-token=${NOTIFICATION_KONG_AUTH_TOKEN:${CORE_KONG_AUTH_TOKEN:}}
notification.kong.client-token.enabled=${NOTIFICATION_KONG_CLIENT_TOKEN_ENABLED:${CORE_KONG_CLIENT_TOKEN_ENABLED:true}}
notification.kong.client-id=${NOTIFICATION_KONG_CLIENT_ID:${CORE_KONG_CLIENT_ID:switch-pagos-internos-service}}
notification.kong.client-secret=${NOTIFICATION_KONG_CLIENT_SECRET:${CORE_KONG_CLIENT_SECRET:}}
notification.kong.required-scope=${NOTIFICATION_KONG_REQUIRED_SCOPE:notification.send}
notification.kong.client-token-path=${NOTIFICATION_KONG_CLIENT_TOKEN_PATH:${CORE_KONG_CLIENT_TOKEN_PATH:/api/v1/auth/client-token}}
notification.kong.client-token-refresh-skew-seconds=${NOTIFICATION_KONG_CLIENT_TOKEN_REFRESH_SKEW_SECONDS:${CORE_KONG_CLIENT_TOKEN_REFRESH_SKEW_SECONDS:60}}
notification.kong.connect-timeout-ms=${NOTIFICATION_KONG_CONNECT_TIMEOUT_MS:5000}
notification.kong.read-timeout-ms=${NOTIFICATION_KONG_READ_TIMEOUT_MS:30000}
notification.switch.origin-service=${NOTIFICATION_SWITCH_ORIGIN_SERVICE:banquito-switch-reporting-service}
notification.switch.event-type-on-us=${NOTIFICATION_SWITCH_EVENT_TYPE_ON_US:MASS_PAYMENT_ON_US_PROCESSED}
notification.switch.event-type-off-us=${NOTIFICATION_SWITCH_EVENT_TYPE_OFF_US:MASS_PAYMENT_OFF_US_INCLUDED}
notification.switch.priority=${NOTIFICATION_SWITCH_PRIORITY:NORMAL}
notification.switch.channel-type=${NOTIFICATION_SWITCH_CHANNEL_TYPE:EMAIL}
notification.switch.subject=${NOTIFICATION_SWITCH_SUBJECT:Pago procesado Banco BanQuito}

grpc.server.port=${GRPC_SERVER_PORT:9095}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
